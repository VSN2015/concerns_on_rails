name: Ruby Gem

on:
  push:
    branches: [ "master" ]

jobs:
  push:
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
    - uses: rubygems/release-gem@v1
